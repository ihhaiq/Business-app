<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spy Bot Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0055;
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        [lang="en"] { direction: ltr; font-family: 'Outfit', sans-serif; }
        [lang="ar"] { direction: rtl; font-family: 'Vazirmatn', sans-serif; }

        body {
            background: var(--bg);
            background-image: linear-gradient(45deg, #050505 25%, #0a0a1a 100%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الشبح التفاعلي */
        .ghost-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            perspective: 1000px;
        }

        #spy-ghost {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.1s ease-out;
            user-select: none;
            display: inline-block;
            filter: drop-shadow(0 0 20px var(--neon-blue));
        }

        /* زر اللغة */
        .lang-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            margin: 10px 0;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease-out backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-blue);
            margin-bottom: 15px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.3);
        }

        .badge-btn {
            background: rgba(112, 0, 255, 0.15);
            color: #d1b3ff;
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
            padding: 5px 10px;
            margin: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .badge-btn:hover {
            background: var(--neon-purple);
            color: white;
        }

        /* زر الحفظ الدائري الممتع */
        .save-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .save-circular-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
            transition: 0.3s;
        }

        .save-circular-btn:active { transform: scale(0.8); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 0, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
        }

        .preview-box {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-left: 3px solid var(--neon-blue);
            border-radius: 5px;
            font-size: 0.85rem;
        }

        .var-tag { color: var(--neon-blue); font-weight: bold; }
    </style>
</head>
<body lang="ar">

    <button class="lang-switcher" onclick="toggleLang()">EN</button>

    <div class="ghost-container">
        <div id="spy-ghost">👻</div>
    </div>

    <div class="header">
        <h1 id="t-title">Spy Detective</h1>
        <p id="t-subtitle" style="color: var(--text-muted)">قائمة تعديل النصوص </p>
    </div>

    <div class="card" style="animation-delay: 0.1s">
        <label class="field-label">👤 <span id="t-name-label">اسمك </span></label>
        <input type="text" id="your_name" placeholder="...">
    </div>

    <div id="fields-container"></div>

    <div class="save-container">
        <button class="save-circular-btn" id="save-btn" title="حفظ">💾</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentLang = 'ar';
        const content = {
            ar: {
                title: "Spy Bot Elite", subtitle: "إعدادات النصوص ",
                nameLabel: "اسمك ", save: "💾",
                fields: [
                    { key: "welcome", label: "رسالة الترحيب", icon: "👋" },
                    { key: "edit_alert", label: "رصد التعديل", icon: "✏️" },
                    { key: "del_alert", label: "رصد الحذف", icon: "🗑️" },
                    { key: "media_alert", label: "رصد الوسائط ", icon: "📸" }
                ],
                preview: "المعاينة :", wait: "بانتظار البيانات..."
            },
            en: {
                title: "Spy Bot Elite", subtitle: "Advanced Stealth Settings",
                nameLabel: "Personal Identifier", save: "💾",
                fields: [
                    { key: "welcome", label: "Welcome Message", icon: "👋" },
                    { key: "edit_alert", label: "Edit Detection", icon: "✏️" },
                    { key: "del_alert", label: "Delete Detection", icon: "🗑️" },
                    { key: "media_alert", label: "Timed Media", icon: "📸" }
                ],
                preview: "System Preview:", wait: "Awaiting input..."
            }
        };

        const VARIABLES = [
            { key: "user_name", sample: "hussein" },
            { key: "time", sample: "10:30 PM" },
            { key: "text", sample: "Hello Spy" }
        ];

        // ملاحقة الشبح للعين
        document.addEventListener('mousemove', (e) => {
            const ghost = document.getElementById('spy-ghost');
            const rect = ghost.getBoundingClientRect();
            const ghostX = rect.left + rect.width / 2;
            const ghostY = rect.top + rect.height / 2;
            const angleX = (e.clientY - ghostY) / 20;
            const angleY = (e.clientX - ghostX) / 20;
            ghost.style.transform = `rotateX(${-angleX}deg) rotateY(${angleY}deg) translateZ(50px)`;
        });

        // تفاعل الشبح عند الضغط
        const ghost = document.getElementById('spy-ghost');
        ghost.onclick = () => {
            ghost.innerText = '👁️';
            setTimeout(() => ghost.innerText = '👻', 1000);
            tg.HapticFeedback.impactOccurred('medium');
        };

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.lang = currentLang;
            document.querySelector('.lang-switcher').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            renderUI();
        }

        function renderUI() {
            const c = content[currentLang];
            document.getElementById('t-title').innerText = c.title;
            document.getElementById('t-subtitle').innerText = c.subtitle;
            document.getElementById('t-name-label').innerText = c.nameLabel;
            
            const container = document.getElementById('fields-container');
            container.innerHTML = '';

            c.fields.forEach((f, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${(index + 2) * 0.1}s`;
                card.innerHTML = `
                    <label class="field-label">${f.icon} <span>${f.label}</span></label>
                    <textarea id="${f.key}" rows="2"></textarea>
                    <div class="badges" id="b-${f.key}"></div>
                    <div class="preview-box">
                        <div style="font-size:10px; opacity:0.6">${c.preview}</div>
                        <div id="p-${f.key}">${c.wait}</div>
                    </div>
                `;
                container.appendChild(card);

                const area = card.querySelector('textarea');
                const prev = card.querySelector(`#p-${f.key}`);
                
                // أزرار المتغيرات
                VARIABLES.forEach(v => {
                    const btn = document.createElement('button');
                    btn.className = 'badge-btn';
                    btn.innerText = `{${v.key}}`;
                    btn.onclick = () => {
                        area.setRangeText(`{${v.key}}`, area.selectionStart, area.selectionEnd, 'end');
                        area.dispatchEvent(new Event('input'));
                    };
                    card.querySelector('.badges').appendChild(btn);
                });

                area.oninput = () => {
                    let val = area.value;
                    VARIABLES.forEach(v => {
                        val = val.replace(new RegExp(`\\{${v.key}\\}`, 'g'), `<span class="var-tag">${v.sample}</span>`);
                    });
                    prev.innerHTML = val || c.wait;
                };
            });
        }

        document.getElementById('save-btn').onclick = () => {
            const data = { name: document.getElementById('your_name').value, texts: {} };
            content.ar.fields.forEach(f => {
                data.texts[f.key] = document.getElementById(f.key).value;
            });
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data));
        };

        renderUI();
    </script>
</body>
</html>
