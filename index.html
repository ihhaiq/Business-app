<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات البوت</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: var(--tg-theme-bg-color); --txt: var(--tg-theme-text-color); }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); padding: 15px; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1); }
        .label { font-weight: bold; color: var(--tg-theme-button-color); display: block; margin-bottom: 5px; }
        textarea, input { width: 100%; border-radius: 10px; padding: 10px; border: 1px solid #ccc; background: var(--bg); color: var(--txt); box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--tg-theme-button-color); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>⚙️ الإعدادات المتطورة</h3>

    <div class="card">
        <label class="label">👤 اسمك الجديد:</label>
        <input type="text" id="your_name" placeholder="أدخل اسمك هنا">
    </div>

    <div class="card">
        <label class="label">👋 رسالة الترحيب:</label>
        <textarea id="welcome_txt" rows="3" placeholder="أدخل نص الترحيب"></textarea>
    </div>

    <div class="card">
        <label class="label">📝 تنبيه التعديل:</label>
        <textarea id="edit_txt" rows="3" placeholder="أدخل نص تنبيه التعديل"></textarea>
    </div>

    <button id="saveBtn">حفظ التغييرات وإرسال ✅</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('saveBtn').addEventListener('click', () => {
            const data = {
                your_name: document.getElementById('your_name').value,
                texts: {
                    welcome: document.getElementById('welcome_txt').value,
                    edit_alert: document.getElementById('edit_txt').value
                }
            };
            
            // حذف الحقول الفارغة لكي لا تتغير في السيرفر
            if(!data.your_name) delete data.your_name;
            if(!data.texts.welcome) delete data.texts.welcome;
            if(!data.texts.edit_alert) delete data.texts.edit_alert;

            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
