<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spy Bot - إعدادات التجسس الاحترافية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc; /* لون برمجيات التجسس */
            --primary-dark: #008f72;
            --bg-dark: #0a0e14;
            --card-bg: rgba(26, 32, 44, 0.7);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(0, 255, 204, 0.2);
            --radius-md: 14px;
            --radius-lg: 22px;
            --glow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 204, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 204, 0.05) 0%, transparent 40%);
        }

        /* أنيميشن الأيقونة المتلاشية في الخلفية */
        .bg-spy-icon {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 250px;
            opacity: 0.03;
            z-index: -1;
            animation: floatingGhost 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatingGhost {
            0%, 100% { transform: translate(-50%, -55%); opacity: 0.02; }
            50% { transform: translate(-50%, -45%); opacity: 0.05; }
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid var(--primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: var(--glow);
        }

        .header-title { font-weight: 700; font-size: 1.3rem; color: var(--primary); }
        .header-subtitle { font-size: 0.85rem; color: var(--text-muted); }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease backwards;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: var(--glow);
            background: rgba(0, 0, 0, 0.5);
        }

        .badges-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .badge-btn {
            background: rgba(0, 255, 204, 0.05);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            direction: ltr;
        }

        .badge-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: var(--glow);
        }

        .preview-bubble-wrap {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            padding: 12px;
        }

        .preview-label { font-size: 0.75rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; }

        .preview-bubble {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .var-highlight {
            color: var(--primary);
            font-weight: bold;
            text-decoration: underline;
        }

        .save-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--bg-dark);
            border: none;
            border-radius: var(--radius-lg);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: var(--glow);
            transition: 0.3s;
        }

        .save-btn:active { transform: scale(0.96); opacity: 0.8; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="bg-spy-icon">👻</div>

    <div class="header">
        <div class="header-icon">🕵️‍♂️</div>
        <div>
            <div class="header-title">Spy Bot Business</div>
            <div class="header-subtitle">مركز التحكم وإدارة التقاط البيانات</div>
        </div>
    </div>

    <div class="card" style="animation-delay: 0.1s;">
        <label class="field-label"><span>👤</span> المعرف الشخصي</label>
        <input type="text" id="your_name" placeholder="أدخل اسم العميل أو اللقب الخاص بك">
    </div>

    <div id="fields-container"></div>

    <button class="save-btn" id="save-btn">تفعيل الإعدادات الأمنية ⚡</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#0a0e14";

        const VARIABLES = [
            { key: "user_name", label: "الاسم", sample: "محمد" },
            { key: "mention", label: "منشن", sample: "@user" },
            { key: "time", label: "الوقت", sample: "12:00 PM" },
            { key: "user_id", label: "الآيدي", sample: "123456" },
            { key: "text", label: "النص", sample: "رسالة سرية" }
        ];

        const FIELDS = [
            { key: "welcome", label: "ترحيب التجسس", icon: "🔗", delay: '0.2s' },
            { key: "edit_alert", label: "تنبيه التعديل", icon: "📝", delay: '0.3s' },
            { key: "del_alert", label: "تنبيه الحذف (Anti-Delete)", icon: "🛡️", delay: '0.4s' },
            { key: "media_alert", label: "الوسائط ذاتية التدمير", icon: "📸", delay: '0.5s' }
        ];

        const container = document.getElementById('fields-container');

        FIELDS.forEach(f => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = f.delay;
            card.innerHTML = `
                <label class="field-label"><span>${f.icon}</span> ${f.label}</label>
                <textarea id="${f.key}" rows="3" placeholder="أدخل القالب البرمجي للرسالة..."></textarea>
                <div class="badges-list" id="badges-${f.key}"></div>
                <div class="preview-bubble-wrap">
                    <div class="preview-label">محاكاة النظام:</div>
                    <div class="preview-bubble" id="preview-${f.key}">بانتظار المدخلات...</div>
                </div>
            `;
            container.appendChild(card);

            const area = card.querySelector('textarea');
            const preview = card.querySelector('.preview-bubble');

            const badgesBox = card.querySelector('.badges-list');
            VARIABLES.forEach(v => {
                const btn = document.createElement('button');
                btn.className = 'badge-btn';
                btn.innerText = `{${v.key}}`;
                btn.onclick = () => {
                    area.setRangeText(`{${v.key}}`, area.selectionStart, area.selectionEnd, 'end');
                    area.dispatchEvent(new Event('input'));
                    area.focus();
                };
                badgesBox.appendChild(btn);
            });

            area.oninput = () => {
                let val = area.value;
                VARIABLES.forEach(v => {
                    val = val.replace(new RegExp(`\\{${v.key}\\}`, 'g'), `<span class="var-highlight">${v.sample}</span>`);
                });
                preview.innerHTML = val.replace(/\n/g, '<br>') || 'بانتظار المدخلات...';
            };
        });

        document.getElementById('save-btn').onclick = () => {
            const data = {
                your_name: document.getElementById('your_name').value,
                texts: {}
            };
            FIELDS.forEach(f => {
                const val = document.getElementById(f.key).value;
                if(val) data.texts[f.key] = val;
            });
            
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data));
        };
    </script>
</body>
</html>
