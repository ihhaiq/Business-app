<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 15px; }
        .card { background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input { width: 90%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>👤 الإعدادات الشخصية</h3>
        <label>اسمي في البوت:</label><br>
        <input type="text" id="your_name" placeholder="مثال: حسين">
    </div>

    <div class="card">
        <h3>✉️ نصوص الرد</h3>
        <label>رسالة الترحيب:</label><br>
        <input type="text" id="welcome_msg" placeholder="أدخل نص الترحيب هنا...">
    </div>

    <button id="save_btn">حفظ الإعدادات ✅</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('save_btn').addEventListener('click', () => {
            const data = {
                your_name: document.getElementById('your_name').value,
                welcome: document.getElementById('welcome_msg').value
            };
            tg.sendData(JSON.stringify(data)); // إرسال البيانات للبوت
        });
    </script>
</body>
</html>
